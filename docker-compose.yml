services:
    dumbdrop:
        image: ${DOCKER_IMAGE_REPO:-sawicki/file-upload}:${DOCKER_IMAGE_TAG:-latest}
        container_name: dumbdrop
        restart: unless-stopped
        ports:
            - ${HOST_BIND_IP:-127.0.0.1}:${HOST_PORT:-3000}:3000
        volumes:
            - ${LOCAL_UPLOAD_DIR:-./local_uploads}:/app/uploads
        environment:
            UPLOAD_DIR: /app/uploads
            NODE_ENV: ${NODE_ENV:-production}
            BASE_URL: ${BASE_URL:-http://localhost:3000/}
            ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
            DUMBDROP_TITLE: ${DUMBDROP_TITLE:-File Upload}
            MAX_FILE_SIZE: ${MAX_FILE_SIZE:-1024}
            DUMBDROP_PIN: ${DUMBDROP_PIN:-}
            AUTO_UPLOAD: ${AUTO_UPLOAD:-true}
            TRUST_PROXY: ${TRUST_PROXY:-true}
            TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-}

    cloudflared:
        image: cloudflare/cloudflared:latest
        container_name: filedrop-cloudflared
        restart: unless-stopped
        profiles:
            - tunnel
        depends_on:
            - dumbdrop
        command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
